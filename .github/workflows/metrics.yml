name: Metrics

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # Header and base stats
      - name: Header
        uses: lowlighter/metrics@latest
        with:
          filename: header.svg
          token: ${{ secrets.GH_PAT }}
          user: bgross0
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/New_York

      # Isometric contribution calendar
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          filename: isocalendar.svg
          token: ${{ secrets.GH_PAT }}
          user: bgross0
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: America/New_York

      # Languages (deep analysis)
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: languages.svg
          token: ${{ secrets.GH_PAT }}
          user: bgross0
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 10
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, dockerfile, makefile, less, scss
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_sections: most-used
          config_timezone: America/New_York

      # Achievements
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: achievements.svg
          token: ${{ secrets.GH_PAT }}
          user: bgross0
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          config_timezone: America/New_York

      # Lines of code, stars, topics
      - name: Notable
        uses: lowlighter/metrics@latest
        with:
          filename: notable.svg
          token: ${{ secrets.GH_PAT }}
          user: bgross0
          template: classic
          base: ""
          plugin_lines: yes
          plugin_lines_sections: base, repositories
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0
          config_timezone: America/New_York
